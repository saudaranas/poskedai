<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Marketing Academy — AI Powered</title>
<style>
:root {
  --green:#1D9E75; --green-bg:#E1F5EE; --green-dark:#085041;
  --text:#111827; --muted:#6b7280; --hint:#9ca3af;
  --bg:#ffffff; --bg2:#f8f9fa; --border:#e5e7eb;
  --yellow:#FEF3C7; --yellow-b:#FCD34D; --yellow-t:#78350F;
  --red-bg:#FEE2E2; --red-t:#991B1B;
  --font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg2);color:var(--text);min-height:100vh;}
#app{max-width:820px;margin:0 auto;background:var(--bg);min-height:100vh;}

/* HEADER */
.hdr{text-align:center;padding:1.25rem 1rem .6rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
.hdr h1{font-size:18px;font-weight:700;margin-bottom:3px;}
.hdr p{font-size:11px;color:var(--muted);}

/* PROGRESS */
.prog-wrap{padding:.5rem 1rem .3rem;}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px;}
.prog-bg{background:var(--border);border-radius:999px;height:6px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:999px;transition:width .4s;}

/* TABS */
.tabs{display:flex;gap:4px;padding:.4rem 1rem .5rem;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;padding:7px 9px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--bg);font-size:11px;font-weight:500;color:var(--muted);text-align:center;min-width:72px;line-height:1.3;transition:all .15s;}
.tab.on{border:2px solid var(--green);color:var(--green-dark);background:var(--green-bg);font-weight:700;}
.tab .ic{font-size:14px;display:block;margin-bottom:2px;}
.tab .sm{font-size:9px;display:block;opacity:.65;margin-top:1px;}

/* PANELS */
.panel{display:none;padding:1rem;}
.panel.on{display:block;}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;}
.card-hdr{display:flex;align-items:center;gap:11px;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:10px;margin-bottom:.9rem;}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.card-hdr h2{font-size:14px;font-weight:700;margin-bottom:1px;}
.card-hdr p{font-size:11px;color:var(--muted);}

/* SECTION LABEL */
.sl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:1rem 0 6px;}

/* INPUTS */
input,textarea,select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;transition:border .15s;}
input:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-green{background:var(--green);color:white;}
.btn-green:hover:not(:disabled){opacity:.85;}
.btn-outline{background:var(--bg);border:1px solid var(--green);color:var(--green);}
.btn-gray{background:var(--bg);border:1px solid var(--border);color:var(--muted);}
.btn-full{width:100%;padding:13px;}

/* LANG TOGGLE */
.lang-row{display:flex;gap:8px;}
.lang-btn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;font-weight:500;color:var(--muted);transition:all .15s;}
.lang-btn.on{border:2px solid var(--green);color:var(--green-dark);background:var(--green-bg);font-weight:700;}



/* ACTION ITEMS */
.act-list{display:flex;flex-direction:column;gap:6px;}
.act-item{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:opacity .2s;}
.act-item.done{opacity:.4;}
.chk{width:18px;height:18px;border-radius:50%;border:1.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .2s;}
.act-item.done .chk{background:var(--green);border-color:var(--green);}
.chk-dot{width:6px;height:6px;background:white;border-radius:50%;display:none;}
.act-item.done .chk-dot{display:block;}
.act-title{font-size:13px;font-weight:500;margin-bottom:2px;}
.act-desc{font-size:11px;color:var(--muted);line-height:1.55;}
.act-week{font-size:9px;color:var(--green);background:var(--green-bg);padding:1px 7px;border-radius:999px;margin-top:4px;display:inline-block;}

/* TIP BOX */
.tip{background:var(--green-bg);border-radius:8px;padding:10px 13px;margin-top:12px;font-size:11px;color:var(--green-dark);line-height:1.65;}
.warn-box{background:var(--yellow);border:1px solid var(--yellow-b);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--yellow-t);margin-bottom:1rem;}

/* FUNNEL STAGES */
.stage{border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:.65rem;}
.stage-hdr{padding:9px 13px;display:flex;align-items:center;gap:10px;}
.stage-num{width:24px;height:24px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.stage-body{padding:9px 13px;border-top:1px solid var(--border);}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.tag{font-size:10px;padding:2px 8px;border-radius:999px;border:1px solid var(--border);}
.eg-box{font-size:11px;color:var(--muted);line-height:1.6;padding:7px 10px;background:var(--bg2);border-radius:7px;}

/* LADDER */
.ladder{display:flex;flex-direction:column;gap:3px;margin-bottom:.75rem;}
.rung{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:8px;border:1px solid var(--border);background:var(--bg);}
.rung-b{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;}
.arr-down{text-align:center;font-size:11px;color:var(--muted);}

/* GEN TYPES */
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem;}
.gen-card{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--bg);transition:all .15s;}
.gen-card.on{border:2px solid var(--green);background:var(--green-bg);}
.gen-icon{font-size:16px;margin-bottom:4px;}
.gen-label{font-size:12px;font-weight:700;}
.gen-card.on .gen-label{color:var(--green-dark);}
.gen-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-top:2px;}

/* RESULT */
.result-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:520px;overflow-y:auto;margin-top:10px;}
.result-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.result-btn-row{display:flex;gap:6px;margin-top:8px;}

/* API KEY */
.api-box{background:var(--yellow);border:1px solid var(--yellow-b);border-radius:10px;padding:12px 14px;}
.api-row{display:flex;justify-content:space-between;align-items:center;}
.api-title{font-size:12px;font-weight:700;color:var(--yellow-t);}
.api-sub{font-size:11px;color:#92400E;margin-top:1px;}
.api-input-row{display:flex;gap:6px;margin-top:8px;}
.api-input-row input{font-family:monospace;font-size:12px;}
.api-note{font-size:10px;color:#92400E;margin-top:6px;}
.api-note a{color:var(--green);font-weight:700;}
.key-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;cursor:pointer;}

/* JABS GRID */
.jab-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.8rem;}
.jab-card{padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--bg);}
.jab-card.special{border:2px solid var(--green);background:var(--green-bg);}
.jab-label{font-size:9px;font-weight:700;color:var(--green);margin-bottom:3px;}
.jab-txt{font-size:11px;color:var(--muted);line-height:1.5;}
.jab-card.special .jab-txt{color:var(--green-dark);}

/* KW GRID */
.kw-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.8rem;}
.kw-card{padding:9px 11px;border-radius:8px;}
.kw-bad{border:1px solid #FCA5A5;background:#FEF2F2;}
.kw-good{border:1px solid #6EE7B7;background:#ECFDF5;}
.kw-title{font-size:9px;font-weight:700;margin-bottom:4px;}
.kw-bad .kw-title{color:#991B1B;}
.kw-good .kw-title{color:#065F46;}
.kw-items{font-size:11px;line-height:1.9;}
.kw-bad .kw-items{color:#7F1D1D;}
.kw-good .kw-items{color:#047857;}

/* FUNNEL AI FLOW */
.flow{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:.8rem;}
.flow-box{border-radius:8px;padding:7px 10px;text-align:center;font-size:10px;font-weight:600;border:1px solid;}
.flow-arr{font-size:10px;color:var(--muted);}
.flow-split{display:grid;grid-template-columns:1fr 1fr;gap:5px;width:100%;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:.8rem;}
.stat{background:var(--bg2);border-radius:8px;padding:9px;text-align:center;}
.stat-n{font-size:18px;font-weight:700;color:var(--green);}
.stat-l{font-size:9px;color:var(--muted);margin-top:2px;}

/* QUOTE */
.quote{font-size:12px;font-style:italic;color:var(--muted);border-left:3px solid var(--green);padding-left:11px;margin-bottom:.9rem;line-height:1.65;}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <h1 id="hdr-title">🎯 Marketing Academy</h1>

  <!-- TABS -->

const TIPS = {

const EXPERT = {
  brunson:{avBg:'#FEE2E2',name:'Russell Brunson — Value Ladder',role:'Pengasas ClickFunnels · DotCom Secrets',quote:'Anda tak perlu 10 funnel. Bina 1 yang terbaik dan beri 90% tumpuan ke sana.'},
  godin:  {avBg:'#EDE9FE',name:'Seth Godin — Permission Marketing',role:'Penulis Purple Cow, This Is Marketing',quote:'Marketing bukan tentang produk yang anda jual. Ia tentang kisah yang anda ceritakan.'},

  modern: {avBg:'#D1FAE5',name:'Strategi 2025 — AI Intent Funnel',role:'Forrester · HubSpot · Omnisend',quote:'Funnel bukan lagi linear. AI kenal pasti niat pelanggan dan bertindak automatik.'},
};

const GEN = [
  {id:'email7',   ic:'📅',label:'Email 7 Hari',       desc:'Sequence welcome hingga upgrade'},
  {id:'welcome',  ic:'👋',label:'Email Welcome',       desc:'Email pertama selepas daftar/beli'},
  {id:'story',    ic:'📖',label:'Kisah Pelanggan',     desc:'Storytelling transformasi pelanggan'},
  {id:'offer',    ic:'🎯',label:'Email Tawaran',       desc:'CTA dengan urgency dan diskaun'},
  {id:'newsletter',ic:'📰',label:'Newsletter',         desc:'Pure value — gaya Seth Godin'},
  {id:'tiktok',   ic:'🎬',label:'10 Idea TikTok',      desc:'Formula Jab Jab Right Hook'},
  {id:'ladder',   ic:'📈',label:'Value Ladder',        desc:'Cadangan tangga nilai produk anda'},
  {id:'seo',      ic:'🔍',label:'50 Keyword SEO',      desc:'Keyword masalah pelanggan sasaran'},
];



// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  tab:'setup',
  product:'', target:'', desc:'', lang:'bm',
  apiKey: localStorage.getItem('mk_k')||'',
  done:{funnel:[],brunson:[],godin:[],garyvee:[],patel:[],modern:[]},
  genType:null, genResult:'', genLoading:false, genError:'',
  showKeyInput:false,
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fp(str){ return str.replace(/\{p\}/g, S.product||'produk anda'); }

function totalDone(){
  return Object.values(S.done).reduce((a,b)=>a+b.length,0);
}

function setApiKey(k){
  S.apiKey=k;
  try{ k ? localStorage.setItem('mk_k',k) : localStorage.removeItem('mk_k'); }catch(e){}
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  renderHeader();
  renderProgress();
  renderTabs();
  renderPanel();
}

function renderHeader(){
  document.getElementById('hdr-title').textContent = S.product ? '📊 '+S.product : '🎯 Marketing Academy';
  document.getElementById('hdr-sub').textContent = S.product
    ? 'Funnel Automation + 5 Pakar Dunia + AI Konten Generator'
    : 'Masukkan produk anda untuk mulakan';
}

function renderProgress(){
  const w = document.getElementById('prog-wrap');
  if(!S.product){ w.style.display='none'; return; }
  w.style.display='block';
  const t=totalDone(), pct=Math.round(t/30*100);
  document.getElementById('prog-txt').textContent = t+'/30 ('+pct+'%)';
  document.getElementById('prog-fill').style.width = pct+'%';
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = MODS.map(m=>`
    <div class="tab${S.tab===m.id?' on':''}" onclick="switchTab('${m.id}')">
      <span class="ic">${m.ic}</span>${m.label}<span class="sm">${m.sm}</span>
    </div>`).join('');
}

function renderPanel(){
  const el = document.getElementById('panels');
  const panels = {};
  MODS.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'panel'+(S.tab===m.id?' on':'');
    div.id = 'pn-'+m.id;
    if(S.tab===m.id){
      if(m.id==='setup')   div.innerHTML = setupHTML();
      else if(m.id==='funnel') div.innerHTML = funnelHTML();
      else if(m.id==='gen')    div.innerHTML = genHTML();
      else                     div.innerHTML = expertHTML(m.id);
    }
    panels[m.id] = div;
  });
  el.innerHTML='';
  Object.values(panels).forEach(p=>el.appendChild(p));
  bindEvents();
}

// ── SETUP PANEL ───────────────────────────────────────────────────────────────
function setupHTML(){
  const apiBox = S.apiKey
    ? `<div class="api-box">
        <div class="api-row">
          <div><div class="api-title">🔑 Anthropic API Key</div>
          <div class="api-sub">✅ API key disimpan — sedia jana konten AI</div></div>
          <button class="btn btn-gray" style="padding:5px 11px;font-size:11px;" onclick="toggleKeyInput()">Tukar</button>
        </div>
        ${S.showKeyInput?keyInputHTML():''}
      </div>`
    : `<div class="api-box">
        <div class="api-row">
          <div><div class="api-title">🔑 Anthropic API Key</div>
          <div class="api-sub">Diperlukan untuk jana konten AI</div></div>
          <button class="btn btn-gray" style="padding:5px 11px;font-size:11px;" onclick="toggleKeyInput()">Set Key</button>
        </div>

// ── GENERATOR PANEL ───────────────────────────────────────────────────────────

  const noProduct = !S.product;
  const noKey = !S.apiKey;
  const prod = S.product||'produk anda';

  const genCards = GEN.map(g=>`
    <div class="gen-card${S.genType===g.id?' on':''}" onclick="selectGenType('${g.id}')">

      <div class="gen-label">${g.label}</div>
      <div class="gen-desc">${g.desc}</div>

  const selected = GEN.find(g=>g.id===S.genType);
  const genSection = S.genType ? `
    <div class="sl">Tambahan / Customisasi (Pilihan)</div>
    <textarea id="inp-note" rows="2" placeholder="Contoh: fokus bulan Ramadan, tambah diskaun 20%, guna nada formal..."></textarea>

// ── ACTION LIST HTML ──────────────────────────────────────────────────────────
function actionsHTML(mod){
  return `<div class="act-list">${(ACTIONS[mod]||[]).map((a,i)=>{
    const done = S.done[mod]?.includes(i);
    return `<div class="act-item${done?' done':''}" onclick="toggleAction('${mod}',${i})">
      <div class="chk"><div class="chk-dot"></div></div>
      <div style="flex:1;">
        <div class="act-title">${fp(a.t)}</div>
        <div class="act-desc">${fp(a.d)}</div>
        <span class="act-week">${a.w}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── EVENT HANDLERS ─────────────────────────────────────────────────────────────
function bindEvents(){}

function switchTab(id){ S.tab=id; render(); window.scrollTo(0,0); }

function saveSetup(){
  S.product = document.getElementById('inp-product')?.value?.trim()||'';
  S.target  = document.getElementById('inp-target')?.value?.trim()||'';
  S.desc    = document.getElementById('inp-desc')?.value?.trim()||'';
  render();
  if(S.product) switchTab('funnel');
}



function setLang(l){ S.lang=l; render(); }

function toggleKeyInput(){ S.showKeyInput=!S.showKeyInput; render(); }

function saveApiKey(){
  const v = document.getElementById('inp-apikey')?.value?.trim()||'';
  setApiKey(v); S.showKeyInput=false; render();
}

function toggleAction(mod,idx){
  const arr = S.done[mod];
  S.done[mod] = arr.includes(idx) ? arr.filter(i=>i!==idx) : [...arr,idx];
  renderProgress();
  // re-render just the action list in current panel
  const panel = document.getElementById('pn-'+S.tab);
  if(!panel) return;
  // full re-render to keep things simple
  renderPanel();
}

function selectGenType(id){ S.genType=id; S.genResult=''; S.genError=''; render(); }
function clearResult(){ S.genType=null; S.genResult=''; S.genError=''; render(); }

function copyResult(){
  const box = document.getElementById('result-box');
  if(!box) return;
  navigator.clipboard.writeText(box.textContent).then(()=>{
    const btn = document.querySelector('.result-hdr button');
    if(btn){ btn.textContent='✅ Disalin!'; setTimeout(()=>{ btn.textContent='📋 Salin'; },2000); }
  });
}

async function generateContent(){
  if(!S.apiKey||!S.product||!S.genType) return;
  S.genLoading=true; S.genError=''; render();

  const note = document.getElementById('inp-note')?.value?.trim()||'';
  const langStr = S.lang==='en' ? 'natural English' : 'Bahasa Malaysia yang natural dan mesra';
  const ctx = `Produk: "${S.product}". Pelanggan sasaran: "${S.target||'pelanggan sasaran'}". Penerangan: "${S.desc||'produk berkualiti'}".`;

  const PROMPTS = {
    email7:`Tulis email sequence 7 hari lengkap untuk "${S.product}" menggunakan strategi Russell Brunson Value Ladder. Setiap email ada subject line, preview text, dan isi kandungan penuh. Format: ### EMAIL [N] — Hari [X].`,
    welcome:`Tulis email selamat datang untuk "${S.product}". Pelanggan baru baru sahaja daftar/beli. Ada subject line, preview text, 3 langkah mudah bermula, dan CTA yang jelas. Tone: mesra dan excited.`,
    story:`Tulis email storytelling tentang seorang pelanggan yang berubah hidup selepas guna "${S.product}". Emosional tapi realistik. Ada subject line, preview text, dan CTA. Cipta nama dan situasi relatable.`,
    offer:`Tulis email tawaran khas untuk "${S.product}" gaya Russell Brunson. Ada urgency dan scarcity yang tulen. Subject line, preview text, tawaran masa terhad, dan P.S. yang kuat.`,
    newsletter:`Tulis newsletter gaya Seth Godin untuk "${S.product}" — pure value, TIADA promosi. 300-400 patah perkataan. Ada subject line, cerita/analogi pendek, 1 tip praktikal, closing inspirational.`,
    tiktok:`Cipta 10 idea konten TikTok/Reels untuk "${S.product}" formula Gary Vaynerchuk. 8 JAB (tips/humor/relatable) + 2 RIGHT HOOK (promosi). Setiap idea: nombor, tajuk, hook 3 saat pertama, isi ringkas, CTA.`,
    ladder:`Bina Value Ladder lengkap untuk "${S.product}" prinsip Russell Brunson. 5 peringkat: percuma → entry → core → premium → VIP. Setiap peringkat ada nama, harga cadangan, apa yang ditawarkan, dan cara lead ke peringkat seterusnya.`,
    seo:`Jana 50 keyword SEO untuk "${S.product}" gaya Neil Patel. Fokus MASALAH pelanggan, bukan nama produk. 5 kategori: (1) Masalah utama, (2) Perbandingan, (3) Tutorial/cara, (4) Soalan FAQ, (5) Long-tail. Setiap keyword satu baris.`,
  };

  const prompt = `Tulis dalam ${langStr}. Gunakan nama produk dan konteks yang diberikan secara konsisten. Jangan guna placeholder. ${ctx}\n\n${PROMPTS[S.genType]}${note?'\n\nNota tambahan: '+note:''}`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:3000,
        system:`Kamu adalah pakar copywriting dan digital marketing. Tulis dalam ${langStr}. Sentiasa gunakan nama produk sebenar — jangan guna placeholder. Hasilkan konten yang terus boleh digunakan.`,
        messages:[{role:'user',content:prompt}],
      }),
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    S.genResult = data.content?.[0]?.text||'';
  }catch(e){
    S.genError = '⚠️ Ralat: '+e.message+'\n\nPastikan API key betul dan ada kredit yang mencukupi.';
  }
  S.genLoading=false; render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
